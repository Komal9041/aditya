spring.application.name=springbootfrontend01

# H2 Database
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (access at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


anthropic.api.key=sk-ant-
anthropic.api.url=https://api.anthropic.com/v1/messages
# Haiku — fastest, cheapest (recommended for ID extraction)
anthropic.api.model=claude-haiku-4-5-20251001
# Sonnet — balanced speed and intelligence
#anthropic.api.model=claude-sonnet-4-20250514
anthropic.api.version=2023-06-01
anthropic.api.max-tokens=1024
logging.level.com.example.idextractor=DEBUG
